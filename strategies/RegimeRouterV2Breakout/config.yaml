# RegimeRouterV2Breakout — breakout entries for trends
# Tests Donchian breakout vs pullback for trend entries

detector:
  type: ema_adx
  params:
    fast_period: 13
    slow_period: 34
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    separation_pct: 0.3
    confirm_bars: 2

regimes:
  trending-up: breakout
  trending-down: breakout
  ranging-up: bb_mean_reversion
  ranging-down: bb_mean_reversion

transitions:
  on_switch: close_all
  cooldown_bars: 8

params:
  # Fixed
  bo_timeframe: '4h'

  # Breakout params — Trial 2262 (test PnL +3.04%, train PnL +2.86%)
  bo_period:
    default: 12
    min: 10
    max: 40
  bo_atr_period:
    default: 18
    min: 7
    max: 21
  bo_atr_sl_mult:
    default: 3.26
    min: 1.0
    max: 4.0

  # BB params
  bb_window:
    default: 20
    min: 15
    max: 50
  bb_mult:
    default: 2.21
    min: 1.5
    max: 3.0
  bb_sl_pct:
    default: 0.028
    min: 0.005
    max: 0.03
  rsi_period:
    default: 10
    min: 7
    max: 21
  rsi_oversold:
    default: 26
    min: 20
    max: 45
  rsi_overbought:
    default: 85
    min: 55
    max: 85

  # Shared
  risk_pct:
    default: 0.148
    min: 0.02
    max: 0.15
  trail_pct:
    default: 0.036
    min: 0.02
    max: 0.10
  sl_pct:
    default: 0.077
    min: 0.02
    max: 0.10
  tp_pct:
    default: 0.244
    min: 0.05
    max: 0.30
