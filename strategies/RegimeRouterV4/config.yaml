# RegimeRouter V4 — SuperTrend V5 detector (optimized)
# SuperTrend + ADX + CHOP for regime detection
# Pullback for trends, BB mean reversion for ranges
#
# Detector params from optimization trial #981 (score 0.7666)

detector:
  type: supertrend_v5
  params:
    st_period: 8
    st_factor: 4.43
    adx_period: 39
    adx_threshold: 33.76
    chop_period: 52
    chop_ranging: 53.48
    chop_trending: 41.91
    confirm_bars: 12

regimes:
  trending-up: trend_pullback
  trending-down: trend_pullback_short
  ranging-up: bb_mean_reversion
  ranging-down: bb_mean_reversion

transitions:
  on_switch: close_all
  cooldown_bars: 8

params:
  # Trend pullback entry
  pb_fast_ema:
    default: 13
    min: 8
    max: 21
  pb_slow_ema:
    default: 34
    min: 20
    max: 55
  pb_rsi_period:
    default: 14
    min: 7
    max: 21
  pb_rsi_max:
    default: 70
    min: 60
    max: 85
  pb_rsi_min:
    default: 30
    min: 15
    max: 40
  pb_atr_period:
    default: 14
    min: 7
    max: 21
  pb_atr_sl_mult:
    default: 2.0
    min: 1.0
    max: 4.0

  # BB mean-reversion
  bb_window:
    default: 20
    min: 10
    max: 50
  bb_mult:
    default: 2.5
    min: 1.5
    max: 3.5
  rsi_period:
    default: 14
    min: 7
    max: 21
  rsi_oversold:
    default: 30
    min: 20
    max: 45
  rsi_overbought:
    default: 70
    min: 55
    max: 85

  # Shared risk / position sizing
  risk_pct:
    default: 0.05
    min: 0.01
    max: 0.2
  trail_pct:
    default: 0.03
    min: 0.01
    max: 0.08
  sl_pct:
    default: 0.05
    min: 0.02
    max: 0.10
  tp_pct:
    default: 0.10
    min: 0.05
    max: 0.30
