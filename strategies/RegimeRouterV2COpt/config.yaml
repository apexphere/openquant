# RegimeRouterV2COpt — Trial 413 optimized params
# Training: Jun-Sep 2025, Sharpe 0.66
# Testing:  Oct-Dec 2025, Sharpe 1.21

detector:
  type: ema_adx
  params:
    fast_period: 13
    slow_period: 34
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    separation_pct: 0.3
    confirm_bars: 2

regimes:
  trending-up: trend_pullback
  trending-down: trend_pullback_short
  ranging-up: bb_mean_reversion
  ranging-down: bb_mean_reversion
  ranging: bb_mean_reversion
  cold-start: null

transitions:
  on_switch: close_all
  cooldown_bars: 8

params:
  # Fixed (not tunable)
  pb_timeframe: '1D'

  # Trend pullback (long + short)
  pb_fast_ema:
    default: 11
    min: 5
    max: 21
  pb_slow_ema:
    default: 29
    min: 20
    max: 55
  pb_rsi_period:
    default: 8
    min: 5
    max: 21
  pb_rsi_max:
    default: 80
    min: 65
    max: 90
  pb_rsi_min:
    default: 39
    min: 20
    max: 45
  pb_atr_period:
    default: 16
    min: 7
    max: 21
  pb_atr_sl_mult:
    default: 1.01
    min: 0.5
    max: 3.0

  # BB mean-reversion (ranging)
  bb_window:
    default: 34
    min: 15
    max: 50
  bb_mult:
    default: 2.05
    min: 1.5
    max: 3.0
  bb_sl_pct:
    default: 0.015
    min: 0.005
    max: 0.03
  rsi_period:
    default: 17
    min: 7
    max: 21
  rsi_oversold:
    default: 31
    min: 20
    max: 45
  rsi_overbought:
    default: 79
    min: 55
    max: 85

  # Shared risk
  risk_pct:
    default: 0.05
    min: 0.02
    max: 0.15
  trail_pct:
    default: 0.053
    min: 0.02
    max: 0.10
  sl_pct:
    default: 0.059
    min: 0.02
    max: 0.10
  tp_pct:
    default: 0.274
    min: 0.10
    max: 0.40
